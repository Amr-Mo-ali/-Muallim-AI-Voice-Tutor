version: "3.8"
services:
  fastapi:
    build: .
    ports: 
      - "8006:8000"
    volumes:
      - .:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=STUDYFLOW AI
    restart: unless-stopped
networks:
  default:
    driver: "bridge"
volumes:
  